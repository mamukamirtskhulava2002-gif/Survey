<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>

    <h1 id=title>Tech & Learning Survey</h1>

    <p id=description>This survey is about technology and learning. It aims to understand what people are studying, how much time they spend learning, and their goals in the tech field. </p>

    <form id="survey-form" action="https://formspree.io/f/mqewowlw" method="POST">

  <!-- NAME -->
  <label id="name-label" for="name">Name:</label>
  <input id="name" name="name" type="text" required placeholder="Enter your name">

  <!-- EMAIL -->
  <label id="email-label" for="email">Email:</label>
  <input id="email" name="email" type="email" required placeholder="Enter your email">

  <!-- AGE -->
  <label id="number-label" for="number">Age:</label>
  <input id="number" name="age" type="number" min="10" max="100" placeholder="Enter your age">

  <!-- ROLE -->
  <label for="dropdown">Current role:</label>
  <select id="dropdown" name="role">
    <option disabled selected>Select your role</option>
    <option value="student">Student</option>
    <option value="developer">Developer</option>
    <option value="designer">Designer</option>
    <option value="self_taught">Self-taught learner</option>
    <option value="other">Other</option>
  </select>

  <!-- EXPERIENCE -->
  <p>Experience level:</p>

  <label>
    <input type="radio" name="experience" value="beginner">
    Beginner
  </label>

  <label>
    <input type="radio" name="experience" value="intermediate">
    Intermediate
  </label>

  <label>
    <input type="radio" name="experience" value="advanced">
    Advanced
  </label>

  <!-- RESOURCES -->
  <p>Learning resources:</p>

  <label>
    <input type="checkbox" name="resources" value="youtube">
    YouTube
  </label>

  <label>
    <input type="checkbox" name="resources" value="online_courses">
    Online courses
  </label>

  <label>
    <input type="checkbox" name="resources" value="books">
    Books
  </label>

  <label>
    <input type="checkbox" name="resources" value="practice_projects">
    Practice projects
  </label>

  <label>
    <input type="checkbox" name="resources" value="school_university">
    School / university
  </label>

  
  <!-- COMMENTS -->
  <p><label for="comments">Additional comments:</label></p>
  <p><textarea id="comments" name="comments" placeholder="Enter your comments"></textarea></p>

  <!-- SUBMIT -->
  <button id="submit" type="submit">Submit</button>

</form>
  </body>
</html>
